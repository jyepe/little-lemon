<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Google Fonts: Markazi Text (display) + Karla (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Karla:ital,wght@0,400;0,500;0,700;1,400&family=Markazi+Text:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!-- Primary Meta Tags -->
    <title>Little Lemon</title>
    <meta name="title" content="Little Lemon" />
    <meta
      name="description"
      content="Little Lemon — a family-owned Mediterranean restaurant focused on traditional recipes served with a modern twist."
    />
    <meta name="author" content="Little Lemon" />
    <meta
      name="keywords"
      content="Little Lemon, Mediterranean, restaurant, food, dining"
    />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Theme Color (browser toolbar / mobile status bar) -->
    <meta name="theme-color" content="#495E57" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://littlelemon.com/" />
    <meta property="og:title" content="Little Lemon" />
    <meta
      property="og:description"
      content="Little Lemon — a family-owned Mediterranean restaurant focused on traditional recipes served with a modern twist."
    />
    <meta property="og:image" content="https://littlelemon.com/og-image.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script src="https://cdn.jsdelivr.net/gh/courseraap/capstone@main/api.js"></script>
  </body>
</html>
